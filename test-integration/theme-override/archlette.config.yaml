# Integration Test: Theme Override
#
# This test validates the theme override functionality where
# the renderer can override the generator's default theme.
# Runs against the archlette codebase itself for realistic output.

project:
  name: Archlette
  description: Architecture-as-Code toolkit for generating C4 diagrams

paths:
  output: ./output
  ir_out: ./output/ir.json
  dsl_out: ./output/workspace.dsl
  render_out: ./output/diagrams
  docs_out: ./output/docs

extractors:
  - use: extractors/builtin/basic-node
    inputs:
      include: ['../../src/**/*.ts']
      exclude: ['**/*.test.ts', '**/*.d.ts']

validators:
  - use: validators/builtin/base-validator

generators:
  - use: generators/builtin/structurizr
  # Generator will use default theme

# Renderer overrides with custom theme
renderers:
  - use: renderers/builtin/structurizr-render
    inputs:
      format: png
      theme: ./custom-theme.dsl # Override generator theme

docs:
  - use: docs/builtin/markdown-docs
